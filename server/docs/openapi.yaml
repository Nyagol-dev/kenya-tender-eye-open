openapi: 3.0.0
info:
  title: Kenya Tender Eye Open API
  version: "1.0.0"
  description: API specification for the Kenya Tender Eye Open backend.
servers:
  - url: http://localhost:5000/api
    description: Local development server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        full_name:
          type: string
          example: "John Doe"
        user_type:
          type: string
          example: "admin"
        service_category_id:
          type: integer
          nullable: true
        entity_name:
          type: string
          nullable: true
      required:
        - id
        - email
    Profile:
      type: object
      properties:
        id:
          type: integer
          example: 10
        user_id:
          type: integer
          example: 1
        full_name:
          type: string
          example: "John Doe"
        user_type:
          type: string
          example: "admin"
        entity_name:
          type: string
          nullable: true
        service_category:
          $ref: '#/components/schemas/ServiceCategory'
      required:
        - id
        - user_id
        - full_name
        - user_type
    ServiceCategory:
      type: object
      properties:
        id:
          type: integer
          example: 5
        name:
          type: string
          example: "Construction"
      required:
        - id
        - name
    AuthResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        user:
          $ref: '#/components/schemas/User'
      required:
        - token
        - user
    Error:
      type: object
      properties:
        code:
          type: integer
          example: 400
        message:
          type: string
          example: "Bad Request"
      required:
        - code
        - message
security:
  - bearerAuth: []
paths:
  /auth/signup:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                full_name:
                  type: string
                user_type:
                  type: string
                service_category_id:
                  type: integer
                  nullable: true
                entity_name:
                  type: string
                  nullable: true
              required:
                - email
                - password
                - full_name
                - user_type
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
              required:
                - email
                - password
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      summary: Logout the current user
      responses:
        '204':
          description: No Content
  /auth/me:
    get:
      summary: Retrieve authenticated user info
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated user info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /profiles/{id}:
    get:
      summary: Get a profile by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Profile not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /service-categories:
    get:
      summary: List service categories
      responses:
        '200':
          description: Array of service categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceCategory'
  /health:
    get:
      summary: Health check endpoint
      responses:
        '200':
          description: Service health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                  - status

  /tenders:
    get:
      summary: List tenders with filtering
      security: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
          description: Full-text search query
        - in: query
          name: sector
          schema:
            type: string
          description: Sector filter
        - in: query
          name: status
          schema:
            type: string
            enum: [open, under-review, awarded, completed, cancelled]
          description: Tender status filter
        - in: query
          name: min_value
          schema:
            type: number
          description: Minimum tender value
        - in: query
          name: max_value
          schema:
            type: number
          description: Maximum tender value
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
          description: Items per page
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Tender'
                  total:
                    type: integer
                  page:
                    type: integer
                  totalPages:
                    type: integer
  /tenders/{id}:
    get:
      summary: Get tender by ID or reference number
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Tender ID or reference number
      responses:
        '200':
          description: Tender found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tender'
        '404':
          description: Tender not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /notifications:
    get:
      summary: List notifications for the authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
  /notifications/{id}/read:
    patch:
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Notification ID
      responses:
        '200':
          description: Notification marked as read
  /notifications/read-all:
    patch:
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All notifications marked as read
  /notifications/count:
    get:
      summary: Get count of unread notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  unreadCount:
                    type: integer
  /notifications/preferences:
    get:
      summary: Retrieve notification preferences
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preferences object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreferences'
    put:
      summary: Update notification preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferences'
      responses:
        '200':
          description: Preferences updated
components:
  schemas:
    Tender:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reference_number:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        sector:
          type: string
        value:
          type: number
          nullable: true
        closing_date:
          type: string
          format: date-time
        status:
          type: string
          enum: [open, under-review, awarded, completed, cancelled]
        issuing_entity_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
